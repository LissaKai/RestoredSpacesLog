<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Restored Spaces — Client Logbook</title>
<link rel="stylesheet" href="colors_and_type.css" />
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#7D9B76"/>
    <rect x="30" y="30" width="40" height="40" rx="9" fill="#5A7354"/>
    <text x="50" y="58" font-family="Georgia,serif" font-size="18" font-weight="bold" fill="#F7F3ED" text-anchor="middle">RS</text>
  </svg>
</template>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--cream);
    font-family: var(--font-sans);
    font-weight: 300;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }
  button { font-family: inherit; cursor: pointer; }
  input, textarea { font-family: inherit; }

  /* ============ SIDEBAR ============ */
  .side {
    width: 300px; flex-shrink: 0; background: var(--white);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
  }
  .brand { padding: 26px 24px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 13px; }
  .rs { width: 42px; height: 42px; border-radius: 11px; background: var(--sage-dark); color: var(--cream);
        display: flex; align-items: center; justify-content: center; font-family: var(--font-serif); font-size: 20px; flex-shrink: 0; }
  .brand-name { font-family: var(--font-serif); font-size: 1.4rem; line-height: 1.05; }
  .brand-sub { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--sage); font-weight: 500; margin-top: 2px; }

  .side-head { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px 10px; }
  .side-head h2 { font-size: 0.66rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted); font-weight: 500; }
  .add-client { border: 1px solid var(--sage); background: transparent; color: var(--sage-dark);
                width: 26px; height: 26px; border-radius: 50%; font-size: 1.1rem; line-height: 0; display: flex; align-items: center; justify-content: center; transition: all .2s var(--ease); }
  .add-client:hover { background: var(--sage); color: var(--cream); }
  .client-search { padding: 4px 18px 10px; }
  .client-search input { width: 100%; background: var(--cream); border: 1px solid var(--border); border-radius: 9px; padding: 9px 13px; font-size: 0.88rem; color: var(--text); }
  .client-search input:focus { outline: none; border-color: var(--sage); }

  .clients { flex: 1; overflow-y: auto; padding: 4px 14px 20px; }
  .client-item {
    display: flex; align-items: center; gap: 11px; padding: 12px 12px; border-radius: 10px;
    cursor: pointer; transition: background .15s var(--ease); margin-bottom: 2px;
  }
  .client-item:hover { background: var(--linen); }
  .client-item.active { background: var(--linen); }
  .folder { width: 20px; height: 20px; flex-shrink: 0; color: var(--sage); }
  .client-item.active .folder { color: var(--sage-dark); }
  .ci-body { flex: 1; min-width: 0; }
  .ci-name { font-size: 0.95rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ci-meta { font-size: 0.72rem; color: var(--text-muted); margin-top: 1px; }
  .empty-clients { padding: 30px 24px; text-align: center; color: var(--text-muted); font-size: 0.85rem; line-height: 1.6; }

  /* ============ BACKUP BAR ============ */
  .side-foot { border-top: 1px solid var(--border); padding: 14px 18px 18px; display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
  .backup-status { display: flex; align-items: center; gap: 7px; font-size: 0.72rem; color: var(--text-muted); }
  .backup-status .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--sage); flex-shrink: 0; }
  .backup-status.warn .dot { background: var(--warm-brown); }
  .backup-status.never .dot { background: var(--error); }
  .backup-status.never { color: var(--error); }
  .backup-btns { display: flex; gap: 8px; }
  .backup-btns button { flex: 1; border: 1px solid var(--border); background: var(--white); color: var(--sage-dark); border-radius: 8px; padding: 10px; font-size: 0.78rem; letter-spacing: 0.03em; transition: all .15s var(--ease); }
  .backup-btns button:hover { border-color: var(--sage); }
  .backup-btns button.primary { background: var(--sage-dark); color: var(--cream); border-color: var(--sage-dark); }
  .backup-btns button.primary:hover { background: var(--sage); border-color: var(--sage); }
  .csv-link { background: none; border: none; color: var(--text-muted); font-size: 0.74rem; text-decoration: underline; cursor: pointer; padding: 2px 0; text-align: left; }
  .csv-link:hover { color: var(--sage-dark); }

  /* ============ MAIN ============ */
  .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
  .main-inner { max-width: 780px; width: 100%; margin: 0 auto; padding: 44px 48px 80px; flex: 1; }

  /* empty state */
  .blank { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); text-align: center; padding: 40px; }
  .blank svg { width: 56px; height: 56px; color: var(--sage-light); margin-bottom: 22px; }
  .blank h3 { font-family: var(--font-serif); font-size: 1.8rem; color: var(--text); font-weight: 300; margin-bottom: 8px; }
  .blank p { font-size: 0.95rem; max-width: 320px; line-height: 1.6; }

  /* client header */
  .c-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
  .c-title { font-family: var(--font-serif); font-size: 2.4rem; font-weight: 300; line-height: 1.05; }
  .c-eyebrow { font-size: 0.66rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--sage); font-weight: 500; margin-bottom: 7px; }
  .c-actions { display: flex; gap: 8px; flex-shrink: 0; padding-top: 6px; }
  .icon-btn { border: 1px solid var(--border); background: var(--white); color: var(--text-muted); border-radius: 8px;
              padding: 7px 13px; font-size: 0.78rem; letter-spacing: 0.04em; transition: all .15s var(--ease); display: flex; align-items: center; gap: 6px; }
  .icon-btn:hover { border-color: var(--sage); color: var(--sage-dark); }
  .icon-btn.danger:hover { border-color: var(--error); color: var(--error); }
  .icon-btn svg { width: 14px; height: 14px; }

  /* totals */
  .totals { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; margin: 24px 0 32px;
            border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .tot { padding: 16px 20px; border-right: 1px solid var(--border); }
  .tot:last-child { border-right: 0; }
  .tot label { display: block; font-size: 0.62rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-muted); font-weight: 500; margin-bottom: 5px; }
  .tot .v { font-family: var(--font-serif); font-size: 1.7rem; color: var(--text); }
  .tot .v.green { color: var(--sage-dark); }

  /* add-session form */
  .form-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 22px 24px 24px; margin-bottom: 34px; box-shadow: var(--shadow-card); }
  .form-card h3 { font-size: 0.68rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--warm-brown); font-weight: 500; margin-bottom: 18px; }
  .frow { display: grid; grid-template-columns: 150px 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .field label { display: block; font-size: 0.66rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); font-weight: 500; margin-bottom: 6px; }
  .field input, .field textarea {
    width: 100%; background: var(--cream); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 13px; font-size: 0.95rem; color: var(--text); transition: border-color .15s var(--ease);
  }
  .field input:focus, .field textarea:focus { outline: none; border-color: var(--sage); }
  .field textarea { resize: vertical; min-height: 90px; line-height: 1.55; }
  .fee-wrap { position: relative; }
  .fee-wrap span { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.95rem; }
  .fee-wrap input { padding-left: 26px; }
  .form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 4px; }
  .btn-primary { background: var(--sage-dark); color: var(--cream); border: 1px solid var(--sage-dark); border-radius: 100px;
                 padding: 11px 26px; font-size: 0.82rem; letter-spacing: 0.06em; transition: all .15s var(--ease); }
  .btn-primary:hover { background: var(--sage); border-color: var(--sage); }
  .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); border-radius: 100px;
               padding: 11px 22px; font-size: 0.82rem; letter-spacing: 0.06em; transition: all .15s var(--ease); }
  .btn-ghost:hover { color: var(--text); border-color: var(--sage); }

  /* session list */
  .sec-label { font-size: 0.68rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-muted); font-weight: 500; margin-bottom: 16px; }
  .session { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 20px 22px; margin-bottom: 12px; transition: box-shadow .15s var(--ease); }
  .session:hover { box-shadow: var(--shadow-card); }
  .s-top { display: flex; align-items: baseline; justify-content: space-between; gap: 14px; margin-bottom: 12px; }
  .s-date { font-family: var(--font-serif); font-size: 1.35rem; color: var(--text); }
  .s-stats { display: flex; align-items: center; gap: 18px; flex-shrink: 0; }
  .s-stat { font-size: 0.84rem; color: var(--text-muted); }
  .s-stat b { color: var(--sage-dark); font-weight: 500; }
  .s-fee { font-family: var(--font-serif); font-size: 1.3rem; color: var(--sage-dark); }
  .s-notes { font-size: 0.95rem; line-height: 1.6; color: var(--text); white-space: pre-wrap; text-wrap: pretty; }
  .s-foot { display: flex; gap: 16px; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }
  .s-link { background: none; border: none; color: var(--text-muted); font-size: 0.78rem; letter-spacing: 0.04em; padding: 0; transition: color .15s var(--ease); }
  .s-link:hover { color: var(--sage-dark); }
  .s-link.del:hover { color: var(--error); }
  .no-sessions { text-align: center; color: var(--text-muted); font-size: 0.9rem; padding: 30px; line-height: 1.6; }

  /* ============ TABS ============ */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin: 22px 0 28px; }
  .tab { background: none; border: 0; padding: 12px 2px; margin-right: 26px; font-size: 0.92rem; color: var(--text-muted);
         letter-spacing: 0.02em; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .15s var(--ease); }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--sage-dark); border-bottom-color: var(--sage-dark); font-weight: 500; }

  /* ============ DETAILS / INTAKE ============ */
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .detail-grid .field.full { grid-column: 1 / -1; }
  .field select {
    width: 100%; background: var(--cream); border: 1px solid var(--border); border-radius: 8px;
    padding: 11px 13px; font-size: 0.95rem; color: var(--text); -webkit-appearance: none; appearance: none;
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="12" height="8" viewBox="0 0 12 8"><path d="M1 1l5 5 5-5" stroke="%237D9B76" stroke-width="1.6" fill="none" stroke-linecap="round"/></svg>');
    background-repeat: no-repeat; background-position: right 14px center;
  }
  .field select:focus { outline: none; border-color: var(--sage); }
  .status-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; flex-wrap: wrap; }
  .status-pill { display: inline-flex; align-items: center; gap: 7px; padding: 7px 15px; border-radius: 100px; font-size: 0.76rem; letter-spacing: 0.05em; font-weight: 500; text-transform: uppercase; }
  .status-pill .dot { width: 8px; height: 8px; border-radius: 50%; }
  .st-new { background: rgba(184,151,106,.16); color: var(--warm-brown); } .st-new .dot { background: var(--warm-brown); }
  .st-booked { background: rgba(125,155,118,.16); color: var(--sage-dark); } .st-booked .dot { background: var(--sage); }
  .st-active { background: rgba(90,115,84,.16); color: var(--sage-dark); } .st-active .dot { background: var(--sage-dark); }
  .st-done { background: var(--linen); color: var(--text-muted); } .st-done .dot { background: var(--text-muted); }
  .contact-line { display: flex; gap: 8px; align-items: center; color: var(--text-muted); font-size: 0.9rem; }
  .save-hint { font-size: 0.78rem; color: var(--sage); opacity: 0; transition: opacity .2s; margin-left: 8px; }
  .save-hint.show { opacity: 1; }

  /* ============ INVOICE ============ */
  .inv-settings { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 22px 24px; margin-bottom: 24px; box-shadow: var(--shadow-card); }
  .inv-settings h3 { font-size: 0.68rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--warm-brown); font-weight: 500; margin-bottom: 16px; }
  .paid-toggle { display: flex; gap: 8px; margin-top: 4px; }
  .paid-toggle button { flex: 1; border: 1px solid var(--border); background: var(--cream); color: var(--text-muted); border-radius: 8px; padding: 11px; font-size: 0.85rem; letter-spacing: 0.04em; transition: all .15s var(--ease); }
  .paid-toggle button.on-unpaid { background: rgba(184,151,106,.14); border-color: var(--warm-brown); color: var(--warm-brown); font-weight: 500; }
  .paid-toggle button.on-paid { background: var(--sage-dark); border-color: var(--sage-dark); color: var(--cream); font-weight: 500; }

  .inv-send { display: flex; gap: 10px; margin-bottom: 20px; }
  .inv-send button { flex: 1; display: flex; align-items: center; justify-content: center; gap: 9px; border-radius: 100px; padding: 13px; font-size: 0.86rem; letter-spacing: 0.04em; transition: all .15s var(--ease); }
  .inv-send svg { width: 16px; height: 16px; }
  .btn-send { background: var(--sage-dark); color: var(--cream); border: 1px solid var(--sage-dark); }
  .btn-send:hover { background: var(--sage); border-color: var(--sage); }
  .btn-prn { background: var(--white); color: var(--sage-dark); border: 1px solid var(--border); }
  .btn-prn:hover { border-color: var(--sage); }

  .invoice { background: var(--white); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .inv-top { padding: 30px 32px 24px; display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; border-bottom: 1px solid var(--border); }
  .inv-from { display: flex; align-items: center; gap: 13px; }
  .inv-rs { width: 44px; height: 44px; border-radius: 11px; background: var(--sage-dark); color: var(--cream); display: flex; align-items: center; justify-content: center; font-family: var(--font-serif); font-size: 20px; flex-shrink: 0; }
  .inv-from .nm { font-family: var(--font-serif); font-size: 1.4rem; line-height: 1.05; }
  .inv-from .tg { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }
  .inv-meta { text-align: right; }
  .inv-meta .lbl { font-family: var(--font-serif); font-size: 1.7rem; font-weight: 300; color: var(--text); letter-spacing: 0.04em; }
  .inv-meta .sub { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }
  .inv-status-stamp { display: inline-block; margin-top: 8px; padding: 5px 14px; border-radius: 100px; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500; }
  .stamp-paid { background: rgba(90,115,84,.15); color: var(--sage-dark); }
  .stamp-unpaid { background: rgba(184,151,106,.16); color: var(--warm-brown); }

  .inv-billto { padding: 20px 32px; border-bottom: 1px solid var(--border); }
  .inv-billto .cap { font-size: 0.64rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--sage); font-weight: 500; margin-bottom: 6px; }
  .inv-billto .who { font-size: 1.05rem; color: var(--text); }
  .inv-billto .addr { font-size: 0.88rem; color: var(--text-muted); margin-top: 2px; line-height: 1.5; }

  .inv-lines { padding: 10px 32px; }
  .inv-line { display: flex; justify-content: space-between; gap: 18px; padding: 14px 0; border-bottom: 1px solid var(--border); }
  .inv-line:last-child { border-bottom: 0; }
  .inv-desc { font-size: 0.95rem; color: var(--text); }
  .inv-desc .sub { font-size: 0.82rem; color: var(--text-muted); margin-top: 3px; line-height: 1.5; }
  .inv-amt { font-family: var(--font-serif); font-size: 1.1rem; color: var(--text); white-space: nowrap; }

  .inv-totals { padding: 16px 32px 28px; }
  .inv-trow { display: flex; justify-content: space-between; padding: 7px 0; font-size: 0.95rem; color: var(--text-muted); }
  .inv-trow .amt { font-variant-numeric: tabular-nums; }
  .inv-trow.due { border-top: 2px solid var(--border); margin-top: 8px; padding-top: 15px; }
  .inv-trow.due .lab { font-family: var(--font-serif); font-size: 1.4rem; color: var(--text); }
  .inv-trow.due .amt { font-family: var(--font-serif); font-size: 1.6rem; color: var(--sage-dark); }
  .inv-foot { padding: 18px 32px 26px; border-top: 1px solid var(--border); font-size: 0.82rem; color: var(--text-muted); text-wrap: pretty; }

  .no-sessions { text-align: center; color: var(--text-muted); font-size: 0.9rem; padding: 30px; line-height: 1.6; }

  /* ============ MODAL ============ */
  .overlay { position: fixed; inset: 0; background: rgba(46,42,37,0.45); display: none; align-items: center; justify-content: center; z-index: 50; padding: 20px; }
  .overlay.show { display: flex; }
  .modal { background: var(--white); border-radius: 16px; padding: 30px 32px 28px; width: 100%; max-width: 420px; box-shadow: var(--shadow-raise); }
  .modal h3 { font-family: var(--font-serif); font-size: 1.6rem; font-weight: 300; margin-bottom: 6px; }
  .modal p { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 18px; line-height: 1.5; }
  .modal input { width: 100%; background: var(--cream); border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; font-size: 1rem; color: var(--text); margin-bottom: 20px; }
  .modal input:focus { outline: none; border-color: var(--sage); }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }

  /* ============ PRINT ============ */
  @media print {
    body { display: block; height: auto; overflow: visible; }
    .side, .c-actions, .form-card, .s-foot, .overlay, .tabs, .back-btn, .inv-settings { display: none !important; }
    .main { overflow: visible; }
    .main-inner { max-width: none; padding: 0; }
    .session { break-inside: avoid; box-shadow: none; }
    .invoice { border: 0; box-shadow: none; }
    .c-head { padding-bottom: 0; border: 0; }
  }

  /* ============ MOBILE / iPHONE ============ */
  .back-btn { display: none; }
  @media (max-width: 760px) {
    body { flex-direction: column; height: 100dvh; }

    /* two-pane becomes two screens, toggled by body[data-view] */
    .side { width: 100%; height: 100dvh; border-right: 0; }
    .main { width: 100%; }
    body[data-view="list"]   .main { display: none; }
    body[data-view="detail"] .side { display: none; }

    .brand { padding: 20px 20px 18px; }
    .side-head { padding: 18px 20px 8px; }
    .add-client { width: 34px; height: 34px; font-size: 1.3rem; }
    .clients { padding: 4px 12px 24px; }
    .client-item { padding: 15px 12px; }
    .ci-name { font-size: 1.05rem; }
    .ci-meta { font-size: 0.8rem; }
    .side-foot { padding: 14px 18px calc(18px + env(safe-area-inset-bottom)); }
    .backup-status { font-size: 0.8rem; }
    .backup-btns button { padding: 13px; font-size: 0.85rem; }
    .csv-link { font-size: 0.8rem; padding: 4px 0; }

    .main-inner { padding: 0 18px 90px; }

    /* sticky mobile top bar with back button */
    .back-btn {
      display: flex; align-items: center; gap: 8px; position: sticky; top: 0; z-index: 5;
      width: calc(100% + 36px); margin: 0 -18px 18px; padding: 15px 18px;
      background: var(--white); border: 0; border-bottom: 1px solid var(--border);
      color: var(--sage-dark); font-size: 0.95rem; letter-spacing: 0.02em;
    }
    .back-btn svg { width: 18px; height: 18px; }

    .c-head { flex-direction: column; padding-top: 20px; }
    .c-title { font-size: 2.1rem; }
    .c-actions { width: 100%; padding-top: 16px; }
    .c-actions .icon-btn { flex: 1; justify-content: center; padding: 11px 10px; font-size: 0.82rem; }

    .totals { margin: 20px 0 26px; }
    .tot { padding: 13px 14px; }
    .tot .v { font-size: 1.45rem; }

    /* stack the form for thumbs; 16px inputs prevent iOS zoom */
    .form-card { padding: 20px 18px 22px; }
    .frow { grid-template-columns: 1fr 1fr; gap: 12px; }
    .frow .field:first-child { grid-column: 1 / -1; }
    .field input, .field textarea { font-size: 16px; padding: 13px 14px; }
    .fee-wrap input { padding-left: 28px; }
    .form-actions .btn-primary { width: 100%; padding: 15px; font-size: 0.9rem; }

    .session { padding: 18px 18px; }
    .s-top { flex-wrap: wrap; gap: 8px; }
    .s-date { font-size: 1.25rem; }
    .s-foot { gap: 22px; }
    .s-link { padding: 4px 0; font-size: 0.85rem; }
