  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Restored Spaces — Client Logbook<\u002Ftitle>\n<style>/* ============================================================\n   RESTORED SPACES — Colors & Type Foundations\n   Home decluttering & organizing · Vacaville & Solano County\n   ============================================================ */\n\n/* ---------- FONTS (self-hosted woff, latin subset) ----------\n   Fallback: link Google Fonts if you prefer the full charset:\n   https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap\n*/\n@font-face { font-family:'Cormorant Garamond'; font-style:normal; font-weight:300; font-display:swap; src:url(\"6c7aedd4-e919-4247-8472-4a7d12d9a2c3\") format('woff'); }\n@font-face { font-family:'Cormorant Garamond'; font-style:normal; font-weight:400; font-display:swap; src:url(\"666e31ff-182e-48d4-b30c-8eeccd0832c5\") format('woff'); }\n@font-face { font-family:'Cormorant Garamond'; font-style:normal; font-weight:500; font-display:swap; src:url(\"3f767d22-8538-430f-9a4b-a84a1962c75f\") format('woff'); }\n@font-face { font-family:'Cormorant Garamond'; font-style:italic; font-weight:400; font-display:swap; src:url(\"10af4184-7b85-4d6f-9685-228e02c9364b\") format('woff'); }\n@font-face { font-family:'Jost'; font-style:normal; font-weight:300; font-display:swap; src:url(\"77c0936c-f81e-4e45-a2c1-f2a45bc6e5c0\") format('woff'); }\n@font-face { font-family:'Jost'; font-style:normal; font-weight:400; font-display:swap; src:url(\"d33abfdb-4e24-4494-9b27-2333e1d8206c\") format('woff'); }\n@font-face { font-family:'Jost'; font-style:normal; font-weight:500; font-display:swap; src:url(\"710faace-d402-4622-8820-13f2f7d494dd\") format('woff'); }\n\n:root {\n  /* ---------- BRAND PALETTE ---------- */\n  --cream:       #F7F3ED;  /* page background — warm off-white */\n  --linen:       #EDE6DA;  /* secondary surface / image placeholders */\n  --white:       #FDFAF6;  /* cards & raised surfaces (a warm white) */\n  --sage:        #7D9B76;  /* primary brand green */\n  --sage-dark:   #5A7354;  /* darker green — dark sections, logo mark, hover */\n  --sage-light:  #A8C1A2;  /* light green — accents on dark, checks */\n  --warm-brown:  #8B6F5C;  /* warm secondary accent (rare) */\n  --text:        #2E2A25;  /* primary ink — near-black warm brown */\n  --text-muted:  #6B6259;  /* secondary text — muted taupe */\n  --error:       #C45C5C;  /* validation only */\n  --border:      rgba(125, 155, 118, 0.25); /* sage @ 25% — hairline dividers */\n\n  /* ---------- SEMANTIC COLOR ROLES ---------- */\n  --bg:           var(--cream);\n  --bg-alt:       var(--white);\n  --bg-inverse:   var(--sage-dark);\n  --surface:      var(--white);\n  --surface-soft: var(--linen);\n  --fg1:          var(--text);        /* primary text */\n  --fg2:          var(--text-muted);  /* secondary text */\n  --fg-on-dark:   var(--cream);\n  --fg-on-dark-muted: rgba(247,243,237,0.85);\n  --accent:       var(--sage);\n  --accent-press: var(--sage-dark);\n  --hairline:     var(--border);\n\n  /* ---------- TYPE FAMILIES ---------- */\n  --font-serif: 'Cormorant Garamond', Georgia, 'Times New Roman', serif; /* display / headings */\n  --font-sans:  'Jost', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; /* body / UI */\n\n  /* ---------- TYPE SCALE (fluid) ---------- */\n  --fs-display: clamp(2.8rem, 4.5vw, 4rem);   /* @kind font */ /* hero H1 */\n  --fs-h1:      clamp(2rem, 3.5vw, 3rem);     /* @kind font */ /* section headings */\n  --fs-h2:      clamp(1.6rem, 2.5vw, 2.2rem); /* @kind font */ /* sub headings / pull quotes */\n  --fs-h3:      1.4rem;  /* @kind font */                      /* card titles */\n  --fs-lead:    1.05rem; /* @kind font */                      /* intro / lead paragraph */\n  --fs-body:    0.95rem; /* @kind font */                       /* default body */\n  --fs-small:   0.88rem; /* @kind font */\n  --fs-eyebrow: 0.72rem; /* @kind font */                       /* uppercase tags / eyebrows */\n\n  /* ---------- WEIGHTS ---------- */\n  --w-light: 300; /* @kind font */\n  --w-reg:   400; /* @kind font */\n  --w-med:   500; /* @kind font */\n\n  /* ---------- LINE HEIGHTS ---------- */\n  --lh-tight:  1.15; /* @kind font */ /* display */\n  --lh-snug:   1.25; /* @kind font */ /* headings */\n  --lh-body:   1.7;  /* @kind font */ /* paragraphs */\n  --lh-loose:  1.8;  /* @kind font */ /* lead paragraphs */\n\n  /* ---------- LETTER SPACING ---------- */\n  --ls-eyebrow: 0.2em;  /* @kind font */ /* section tags */\n  --ls-label:   0.12em; /* @kind font */ /* nav links, buttons */\n  --ls-wide:    0.15em; /* @kind font */ /* badges */\n  --ls-display: 0.02em; /* @kind font */\n\n  /* ---------- RADII ---------- */\n  --r-sharp:  2px;    /* inputs, small chips */\n  --r-card:   3px;    /* cards, sections, form wrapper (signature soft-square) */\n  --r-soft:   12px;   /* hero feature cards, icon tiles */\n  --r-pill:   100px;  /* buttons, badges */\n  --r-round:  50%;    /* avatars, icon circles */\n\n  /* ---------- SPACING SCALE ---------- */\n  --sp-1: 0.4rem;\n  --sp-2: 0.75rem;\n  --sp-3: 1rem;\n  --sp-4: 1.5rem;\n  --sp-5: 2rem;\n  --sp-6: 2.5rem;\n  --sp-7: 3rem;\n  --sp-section: 7rem;  /* vertical rhythm between major sections */\n  --container: 1160px; /* max content width */\n\n  /* ---------- ELEVATION ---------- */\n  --shadow-card:  0 4px 20px rgba(0,0,0,0.06);   /* hover lift on light cards */\n  --shadow-raise: 0 8px 40px rgba(0,0,0,0.05);   /* form / floating panels */\n  --shadow-hover: 0 12px 40px rgba(0,0,0,0.08);  /* service card hover */\n\n  /* ---------- MOTION ---------- */\n  --ease: cubic-bezier(0.4, 0, 0.2, 1); /* @kind other */\n  --dur-fast: 0.2s; /* @kind other */\n  --dur-base: 0.3s; /* @kind other */\n  --dur-slow: 0.7s; /* @kind other */\n}\n\n/* ============================================================\n   SEMANTIC TYPOGRAPHY  (apply directly, or copy the rules)\n   ============================================================ */\n.rs-body {\n  font-family: var(--font-sans);\n  font-weight: var(--w-light);\n  font-size: var(--fs-body);\n  line-height: var(--lh-body);\n  color: var(--fg1);\n}\n\n.rs-display {           /* hero headline */\n  font-family: var(--font-serif);\n  font-weight: var(--w-light);\n  font-size: var(--fs-display);\n  line-height: var(--lh-tight);\n  color: var(--fg1);\n}\n.rs-display em { font-style: italic; color: var(--accent); }\n\n.rs-h1 {                /* section heading */\n  font-family: var(--font-serif);\n  font-weight: var(--w-light);\n  font-size: var(--fs-h1);\n  line-height: var(--lh-snug);\n  color: var(--fg1);\n}\n.rs-h1 em { font-family: var(--font-serif); font-style: italic; color: var(--accent); }\n\n.rs-h2 {                /* pull quote / large italic */\n  font-family: var(--font-serif);\n  font-weight: var(--w-light);\n  font-style: italic;\n  font-size: var(--fs-h2);\n  line-height: var(--lh-snug);\n}\n\n.rs-h3 {                /* card title */\n  font-family: var(--font-serif);\n  font-weight: var(--w-reg);\n  font-size: var(--fs-h3);\n  line-height: 1.3;\n  color: var(--fg1);\n}\n\n.rs-lead {              /* intro paragraph */\n  font-family: var(--font-sans);\n  font-weight: var(--w-light);\n  font-size: var(--fs-lead);\n  line-height: var(--lh-loose);\n  color: var(--fg2);\n}\n\n.rs-p {                 /* default paragraph */\n  font-family: var(--font-sans);\n  font-weight: var(--w-light);\n  font-size: var(--fs-body);\n  line-height: var(--lh-body);\n  color: var(--fg2);\n}\n\n.rs-eyebrow {           /* uppercase section tag */\n  font-family: var(--font-sans);\n  font-weight: var(--w-med);\n  font-size: var(--fs-eyebrow);\n  letter-spacing: var(--ls-eyebrow);\n  text-transform: uppercase;\n  color: var(--accent);\n}\n\n.rs-label {             /* form labels, nav, buttons
